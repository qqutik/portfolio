services:
  backend:
    build:
      context: ./backend
    container_name: portfolio_backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-18fcfe1841597447313927bdcddd5a0c}
      # БД зовнішня. host.docker.internal вказує на хост-машину (Docker Desktop).
      # Реальні host/порт/креденшали задаються через .env.local у корені проєкту.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-app}?serverVersion=17&charset=utf8"
    # host.docker.internal на Linux-хостах треба резолвити явно (на macOS/Windows працює з коробки).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Код монтується всередину контейнера — зміни в backend/ підхоплюються без перезбірки.
      - ./backend:/app
      # vendor лишаємо з образу (не перекриваємо хостовою текою).
      - /app/vendor
    ports:
      - "${BACKEND_PORT:-8000}:80"
    networks:
      - portfolio

  frontend:
    build:
      context: ./frontend
    container_name: portfolio_frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # URL беку для звернень із SSR-сервера всередині мережі Docker
      BACKEND_URL: "http://backend:80"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
